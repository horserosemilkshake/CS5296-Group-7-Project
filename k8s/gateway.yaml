apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: realtime-asr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: realtime-asr-gateway:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - uvicorn backend.app.main:app --host 0.0.0.0 --port ${APP_PORT} --workers ${WEB_CONCURRENCY}
          envFrom:
            - configMapRef:
                name: realtime-asr-config
          ports:
            - containerPort: 8765
          resources:
            requests:
              cpu: "300m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "24Gi"
          livenessProbe:
            httpGet:
              path: /
              port: 8765
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8765
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: realtime-asr
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 80
      targetPort: 8765
  type: LoadBalancer
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
